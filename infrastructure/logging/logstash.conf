# Core Bank Mandiri - Logstash Configuration
# Centralized logging pipeline for all microservices

input {
  # TCP input for application logs (Filebeat -> Logstash)
  beats {
    port => 5044
    ssl => false
  }

  # TCP input for direct application logging
  tcp {
    port => 5000
    codec => json_lines
  }

  # Kafka input for audit logs
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["audit.event"]
    group_id => "logstash-audit"
    consumer_threads => 3
    decorate_events => true
    auto_offset_reset => "latest"
  }
}

filter {
  # Parse JSON logs from applications
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
    }
    
    # Move parsed fields to root level
    mutate {
      add_field => {
        "trace_id" => "%{[parsed][trace_id]}"
        "span_id" => "%{[parsed][span_id]}"
        "level" => "%{[parsed][level]}"
        "logger" => "%{[parsed][logger]}"
        "service" => "%{[parsed][service]}"
      }
    }
  }

  # Add timestamp if not present
  if ![timestamp] {
    date {
      match => ["[parsed][timestamp]", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }
  }

  # Parse Spring Boot logs
  if [service] == "auth-service" or [service] == "account-service" or [service] == "transaction-service" or [service] == "audit-service" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} \[%{DATA:thread}\] %{LOGLEVEL:level} %{DATA:class} \[trace=%{DATA:trace_id}, span=%{DATA:span_id}\] - %{GREEDYDATA:log_message}"
      }
      overwrite => ["message"]
    }
  }

  # Parse Go service logs
  if [service] == "payment-service" or [service] == "fraud-detection-service" or [service] == "notification-service" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} %{LOGLEVEL:level} %{GREEDYDATA:log_message}"
      }
    }
  }

  # Add environment tags
  mutate {
    add_field => {
      "environment" => "production"
      "cluster" => "core-bank"
      "region" => "ap-southeast-1"
    }
  }

  # GeoIP for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["host", "agent", "ecs", "input", "beat"]
  }

  # Mask sensitive data
  mutate {
    gsub => [
      "message", "\b\d{16}\b", "[CARD_NUMBER_REDACTED]",
      "message", "\b\d{4}-\d{4}-\d{4}-\d{4}\b", "[CARD_NUMBER_REDACTED]",
      "message", "\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b", "[EMAIL_REDACTED]"
    ]
  }
}

output {
  # Primary output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "core-bank-logs-%{+YYYY.MM.dd}"
    template => "core-bank-template"
    template_overwrite => true
    manage_template => true
    ilm_enabled => true
    ilm_rollover_alias => "core-bank-logs"
    ilm_pattern => "000001"
    ilm_policy => "core-bank-logs-policy"
    pipeline => "core-bank-pipeline"
  }

  # Route audit logs to separate index
  if [service] == "audit-service" or [type] == "audit" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "core-bank-audit-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "core-bank-audit"
      ilm_pattern => "000001"
      ilm_policy => "core-bank-audit-policy"
    }
  }

  # Route fraud alerts to separate index
  if [type] == "fraud_alert" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "core-bank-fraud-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "core-bank-fraud"
      ilm_pattern => "000001"
      ilm_policy => "core-bank-fraud-policy"
    }
  }

  # Route error logs to separate index for alerting
  if [level] == "ERROR" or [level] == "FATAL" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "core-bank-errors-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "core-bank-errors"
      ilm_pattern => "000001"
      ilm_policy => "core-bank-errors-policy"
    }
  }

  # Debug output to stdout (disable in production)
  # stdout { codec => rubydebug }
}
